<!DOCTYPE html>
<html lang="en">
<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Harry's iPodfolio</title>
<meta name="description" content="Harry Schwartz's portfolio — an interactive iPod Classic web experience">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="iPodfolio">
<link rel="apple-touch-icon" href="img/apple-touch-icon.png">

<!-- Android theme -->
<meta name="theme-color" content="#e8779e">
<meta name="mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Studio backdrop with curved perspective grid -->
  <canvas id="studio-grid" class="studio-backdrop"></canvas>

  <div class="ipod-shell" data-theme="pink">

    <!-- Screen -->
    <div class="ipod-screen">
      <!-- Header Bar -->
      <div class="ipod-header">
        <h3 id="header-title">Harry's iPodfolio</h3>
        <div class="header-icons">
          <svg id="header-play-icon" class="header-play-icon" style="display:none" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="2,0 12,6 2,12" fill="#333"/>
          </svg>
          <svg id="header-pause-icon" class="header-pause-icon" style="display:none" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="0" width="3.5" height="12" fill="#333"/>
            <rect x="7.5" y="0" width="3.5" height="12" fill="#333"/>
          </svg>
          <div class="battery-indicator">
            <div class="battery-fill"></div>
          </div>
        </div>
      </div>
      
      <!-- Screen Content -->
      <div class="screen-content" id="screen-content">
        <!-- Views are rendered here dynamically -->
      </div>
    </div>

    <!-- Dramatic wear scratches — covers entire iPod shell (wheel + screen masked out) -->
    <div class="wear-overlay wear-scratches-body" aria-hidden="true"></div>

    <!-- Click Wheel -->
    <div class="clickwheel-container">
      <div class="clickwheel" id="clickwheel">
        <!-- Menu button (top) -->
        <div class="wheel-button top">
          <span class="wheel-menu-text">MENU</span>
        </div>
        
        <!-- Rewind button (left) -->
        <div class="wheel-button left">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="9,0 0,7 9,14" style="fill: var(--wheel-button)"/>
            <polygon points="18,0 9,7 18,14" style="fill: var(--wheel-button)"/>
          </svg>
        </div>
        
        <!-- Center button -->
        <div class="center-button"></div>
        
        <!-- Fast Forward button (right) -->
        <div class="wheel-button right">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="0,0 9,7 0,14" style="fill: var(--wheel-button)"/>
            <polygon points="9,0 18,7 9,14" style="fill: var(--wheel-button)"/>
          </svg>
        </div>
        
        <!-- Play/Pause button (bottom) -->
        <div class="wheel-button bottom">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="0,0 8,7 0,14" style="fill: var(--wheel-button)"/>
            <rect x="11" y="0" width="3" height="14" style="fill: var(--wheel-button)"/>
            <rect x="16" y="0" width="3" height="14" style="fill: var(--wheel-button)"/>
          </svg>
        </div>
      </div>
    </div>
  </div>



  <!-- Scripts -->
  <script src="js/qr-overlay.js"></script>
  <script src="js/tutorial-overlay.js"></script>
  <script src="js/studio-grid.js"></script>
  <script src="js/data.js"></script>
  <script src="js/audio-player.js"></script>
  <script src="js/clickwheel.js"></script>
  <script src="js/brick-game.js"></script>
  <script src="js/cover-flow.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Fine-tune the scratch mask to exclude both the click wheel and screen areas.
    // Uses an inline SVG mask with userSpaceOnUse coordinates for pixel-perfect cutouts.
    (function() {
      var svgNS = 'http://www.w3.org/2000/svg';
      var maskSvg, maskEl, whiteRect, screenRect, wheelCircle;

      function ensureMaskSvg() {
        if (maskSvg) return;
        maskSvg = document.createElementNS(svgNS, 'svg');
        maskSvg.setAttribute('width', '0');
        maskSvg.setAttribute('height', '0');
        maskSvg.style.position = 'absolute';

        var defs = document.createElementNS(svgNS, 'defs');
        maskEl = document.createElementNS(svgNS, 'mask');
        maskEl.setAttribute('id', 'scratch-mask');
        maskEl.setAttribute('maskUnits', 'userSpaceOnUse');

        // White background = visible scratches
        whiteRect = document.createElementNS(svgNS, 'rect');
        whiteRect.setAttribute('fill', 'white');

        // Black rect = screen cutout (no scratches on screen)
        screenRect = document.createElementNS(svgNS, 'rect');
        screenRect.setAttribute('fill', 'black');
        screenRect.setAttribute('rx', '4');
        screenRect.setAttribute('ry', '4');

        // Black circle = wheel cutout (no scratches on wheel)
        wheelCircle = document.createElementNS(svgNS, 'circle');
        wheelCircle.setAttribute('fill', 'black');

        maskEl.appendChild(whiteRect);
        maskEl.appendChild(screenRect);
        maskEl.appendChild(wheelCircle);
        defs.appendChild(maskEl);
        maskSvg.appendChild(defs);
        document.body.appendChild(maskSvg);
      }

      function updateScratchMask() {
        var shell = document.querySelector('.ipod-shell');
        var wheel = document.querySelector('.clickwheel');
        var screen = document.querySelector('.ipod-screen');
        var overlay = document.querySelector('.wear-scratches-body');
        if (!shell || !wheel || !screen || !overlay) return;

        ensureMaskSvg();

        var sr = shell.getBoundingClientRect();
        var wr = wheel.getBoundingClientRect();
        var scr = screen.getBoundingClientRect();
        var shellW = sr.width;
        var shellH = sr.height;

        // SVG mask covers the full shell
        maskEl.setAttribute('x', '0');
        maskEl.setAttribute('y', '0');
        maskEl.setAttribute('width', shellW);
        maskEl.setAttribute('height', shellH);

        whiteRect.setAttribute('width', shellW);
        whiteRect.setAttribute('height', shellH);

        // Screen cutout (relative to shell)
        var screenLeft = scr.left - sr.left;
        var screenTop = scr.top - sr.top;
        screenRect.setAttribute('x', screenLeft);
        screenRect.setAttribute('y', screenTop);
        screenRect.setAttribute('width', scr.width);
        screenRect.setAttribute('height', scr.height);

        // Wheel cutout — full clickwheel circle with 3px buffer
        var wheelCx = (wr.left + wr.width / 2) - sr.left;
        var wheelCy = (wr.top + wr.height / 2) - sr.top;
        var wheelR = wr.width / 2 + 3;
        wheelCircle.setAttribute('cx', wheelCx);
        wheelCircle.setAttribute('cy', wheelCy);
        wheelCircle.setAttribute('r', wheelR);

        // Apply SVG mask
        overlay.style.webkitMaskImage = '';
        overlay.style.maskImage = '';
        overlay.style.webkitMask = 'url(#scratch-mask)';
        overlay.style.mask = 'url(#scratch-mask)';
      }
      window.addEventListener('load', updateScratchMask);
      window.addEventListener('resize', updateScratchMask);
    })();
  </script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
